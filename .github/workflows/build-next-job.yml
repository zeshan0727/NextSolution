name: Build Next Job TIPA

on:
  workflow_dispatch:
  push:
    branches:
      - agent/next-job-v1.0.0-0723
    paths:
      - "NextJob/**"
      - ".github/workflows/build-next-job.yml"
  pull_request:
    branches:
      - main
    paths:
      - "NextJob/**"
      - ".github/workflows/build-next-job.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Apply Next Job 1.0.1 interface patch
        run: |
          git apply --check NextJob/Patches/next-job-1.0.1.patch
          git apply NextJob/Patches/next-job-1.0.1.patch

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app icon
        run: |
          xcrun --sdk macosx swift \
            NextJob/Scripts/GenerateIcon.swift \
            NextJob/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Generate Xcode project
        run: |
          cd NextJob
          xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          set -o pipefail
          xcodebuild \
            -quiet \
            -project NextJob/NextJob.xcodeproj \
            -scheme NextJob \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build-next-job \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee next-job-build.log

      - name: Upload compiler log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: NextJob-Compiler-Log
          path: next-job-build.log
          if-no-files-found: error

      - name: Package for TrollStore
        run: |
          APP_PATH="$(find build-next-job/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NextJob-1.0.1.tipa
          shasum -a 256 NextJob-1.0.1.tipa > NextJob-1.0.1.sha256

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: NextJob-TrollStore-1.0.1
          path: |
            NextJob-1.0.1.tipa
            NextJob-1.0.1.sha256
          if-no-files-found: error
