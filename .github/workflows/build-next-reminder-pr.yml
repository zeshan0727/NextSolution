name: Build Next Reminder v1.0.1

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'NextReminderApp/**'
      - '.github/workflows/build-next-reminder-pr.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Build and verify TIPA
        run: |
          chmod +x NextReminderApp/ci/build.sh
          NextReminderApp/ci/build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: NextReminder-v1.0.1-TIPA
          path: |
            NextReminderApp/NextReminder-v1.0.1-unsigned.tipa
            NextReminderApp/NextReminder-v1.0.1-unsigned.ipa
            NextReminderApp/NextReminder-v1.0.1-unsigned.tipa.sha256
            NextReminderApp/xcodebuild.log
          if-no-files-found: error
          retention-days: 7
