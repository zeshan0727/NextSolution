name: Build Next Reminder PR

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'NextReminderApp/**'
      - '.github/workflows/build-next-reminder-pr.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: NextReminderApp
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Generate app icons
        run: |
          set -euo pipefail
          ICON_DIR="NextReminder/Resources/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          python3 - "$ICON_DIR/AppIcon-1024.png" <<'PY'
          import struct, sys, zlib
          W = H = 1024
          pixels = bytearray(W * H * 4)
          def put(x, y, color):
              if 0 <= x < W and 0 <= y < H:
                  i = (y * W + x) * 4
                  pixels[i:i+4] = bytes(color)
          for y in range(H):
              for x in range(W):
                  d = ((x - 512) ** 2 + (y - 460) ** 2) ** 0.5 / 760
                  glow = max(0.0, 1.0 - d)
                  put(x, y, (int(7 + 13 * glow), int(9 + 7 * glow), int(13 + 2 * glow), 255))
          orange = (255, 112, 0, 255)
          orange2 = (255, 72, 0, 255)
          pale = (255, 202, 145, 255)
          border = (116, 53, 10, 255)
          panel = (17, 20, 27, 255)
          def circle(cx, cy, r, color):
              rr = r * r
              for yy in range(max(0, cy-r), min(H, cy+r+1)):
                  dy = yy - cy
                  dx = int((rr - dy*dy) ** 0.5) if rr >= dy*dy else 0
                  for xx in range(max(0, cx-dx), min(W, cx+dx+1)):
                      put(xx, yy, color)
          def rect(x0, y0, x1, y1, color):
              for yy in range(max(0, y0), min(H, y1)):
                  for xx in range(max(0, x0), min(W, x1)):
                      put(xx, yy, color)
          def rounded_rect(x0, y0, x1, y1, radius, color):
              rect(x0+radius, y0, x1-radius, y1, color)
              rect(x0, y0+radius, x1, y1-radius, color)
              circle(x0+radius, y0+radius, radius, color)
              circle(x1-radius-1, y0+radius, radius, color)
              circle(x0+radius, y1-radius-1, radius, color)
              circle(x1-radius-1, y1-radius-1, radius, color)
          rounded_rect(70, 70, 954, 954, 190, border)
          rounded_rect(78, 78, 946, 946, 182, (12, 10, 12, 255))
          circle(512, 455, 275, border)
          circle(512, 455, 260, (21, 13, 12, 255))
          circle(512, 405, 175, orange)
          rect(337, 405, 687, 628, orange)
          for y in range(526, 676):
              half = int(175 + (y - 526) * 0.52)
              rect(512-half, y, 512+half, y+1, orange)
          rect(265, 625, 760, 682, orange)
          circle(512, 704, 51, orange2)
          rounded_rect(470, 200, 554, 306, 39, orange2)
          for y in range(260, 370):
              for x in range(360, 665):
                  d = ((x-512)**2 + (y-430)**2) ** 0.5
                  if 171 < d < 187 and y < 350:
                      put(x, y, pale)
          rounded_rect(682, 650, 904, 872, 58, orange)
          rounded_rect(691, 659, 895, 863, 50, panel)
          rect(744, 725, 772, 820, orange)
          rect(822, 725, 850, 820, orange)
          for y in range(725, 821):
              x = 768 + int((y - 725) * 0.58)
              rect(x, y, x+30, y+1, orange)
          def chunk(tag, data):
              return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
          raw = bytearray()
          stride = W * 4
          for y in range(H):
              raw.append(0)
              raw.extend(pixels[y*stride:(y+1)*stride])
          png = b'\x89PNG\r\n\x1a\n'
          png += chunk(b'IHDR', struct.pack('>IIBBBBB', W, H, 8, 6, 0, 0, 0))
          png += chunk(b'IDAT', zlib.compress(bytes(raw), 9))
          png += chunk(b'IEND', b'')
          with open(sys.argv[1], 'wb') as f:
              f.write(png)
          PY
          for size in 40 58 60 80 87 120 180; do
            sips -z "$size" "$size" "$ICON_DIR/AppIcon-1024.png" --out "$ICON_DIR/AppIcon-$size.png" >/dev/null
          done

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          set +e
          xcodebuild \
            -project NextReminder.xcodeproj \
            -scheme NextReminder \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build > xcodebuild.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo '===== COMPILER ERRORS ====='
            grep -nE 'error:|BUILD FAILED|Command .* failed' xcodebuild.log | tail -120 || true
            echo '===== LOG TAIL ====='
            tail -100 xcodebuild.log
            exit "$status"
          fi
          tail -60 xcodebuild.log

      - name: Package TIPA
        run: |
          set -euo pipefail
          mkdir -p Payload
          cp -R build/NextReminder.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NextReminder-unsigned.ipa
          cp NextReminder-unsigned.ipa NextReminder-unsigned.tipa
          shasum -a 256 NextReminder-unsigned.tipa > NextReminder-unsigned.tipa.sha256

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NextReminder-TIPA-${{ github.run_number }}
          path: |
            NextReminderApp/NextReminder-unsigned.tipa
            NextReminderApp/NextReminder-unsigned.ipa
            NextReminderApp/NextReminder-unsigned.tipa.sha256
            NextReminderApp/xcodebuild.log
          if-no-files-found: warn
          retention-days: 7
