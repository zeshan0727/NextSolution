name: Build Next Reminder v1.2.3

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Build and verify v1.2.3
        run: |
          chmod +x NextReminderApp/ci/build-v123.sh
          NextReminderApp/ci/build-v123.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NextReminder-v1.2.3
          if-no-files-found: warn
          path: |
            NextReminderApp/NextReminder-v1.2.3-unsigned.tipa
            NextReminderApp/NextReminder-v1.2.3-unsigned.ipa
            NextReminderApp/NextReminder-v1.2.3-unsigned.tipa.sha256
            NextReminderApp/xcodebuild.log
