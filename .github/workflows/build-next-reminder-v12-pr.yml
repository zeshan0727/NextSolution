name: Build Next Reminder v1.2

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'NextReminderApp/**'
      - '.github/workflows/build-next-reminder-v12-pr.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Build and verify TIPA
        run: |
          chmod +x NextReminderApp/ci/build-v12.sh
          NextReminderApp/ci/build-v12.sh

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NextReminder-v1.2.0-TIPA
          path: |
            NextReminderApp/NextReminder-v1.2.0-unsigned.tipa
            NextReminderApp/NextReminder-v1.2.0-unsigned.ipa
            NextReminderApp/NextReminder-v1.2.0-unsigned.tipa.sha256
            NextReminderApp/NextReminder/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
            NextReminderApp/xcodebuild.log
          if-no-files-found: warn
          retention-days: 7
