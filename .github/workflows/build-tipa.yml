name: Build Daily Ledger TIPA

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"
  push:
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project DailyLedger.xcodeproj \
            -scheme DailyLedger \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package for TrollStore
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload DailyLedger-1.2.0.tipa
          shasum -a 256 DailyLedger-1.2.0.tipa > DailyLedger-1.2.0.sha256

      - name: Test SMS parser
        run: |
          xcrun clang \
            -fobjc-arc \
            RootHideSMSImport/Sources/main.m \
            -framework Foundation \
            -framework CoreFoundation \
            -lsqlite3 \
            -o build/dailyledgersmsd-macos
          build/dailyledgersmsd-macos --self-test

      - name: Build RootHide SMS importer
        run: |
          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=16.0 \
            -fobjc-arc \
            RootHideSMSImport/Sources/main.m \
            -framework Foundation \
            -framework CoreFoundation \
            -lsqlite3 \
            -o build/dailyledgersmsd
          codesign --force --sign - build/dailyledgersmsd

      - name: Package RootHide add-on
        run: |
          rm -rf build/rootHidePackage build/deb-parts
          mkdir -p build/rootHidePackage build/deb-parts
          cp -R RootHideSMSImport/layout/. build/rootHidePackage/
          mkdir -p build/rootHidePackage/usr/libexec
          cp build/dailyledgersmsd build/rootHidePackage/usr/libexec/dailyledgersmsd
          chmod 755 \
            build/rootHidePackage/usr/libexec/dailyledgersmsd \
            build/rootHidePackage/DEBIAN/postinst \
            build/rootHidePackage/DEBIAN/prerm
          chmod 644 \
            build/rootHidePackage/DEBIAN/control \
            build/rootHidePackage/Library/LaunchDaemons/com.nextsolution.dailyledger.smsimport.plist
          printf '2.0\n' > build/deb-parts/debian-binary
          COPYFILE_DISABLE=1 tar --uid 0 --gid 0 --uname root --gname wheel -C build/rootHidePackage/DEBIAN -czf build/deb-parts/control.tar.gz .
          COPYFILE_DISABLE=1 tar --uid 0 --gid 0 --uname root --gname wheel -C build/rootHidePackage --exclude ./DEBIAN -czf build/deb-parts/data.tar.gz .
          (cd build/deb-parts && xcrun llvm-ar --format=gnu rc ../../DailyLedgerSMSImport-1.0.0-roothide.deb debian-binary control.tar.gz data.tar.gz)
          shasum -a 256 DailyLedgerSMSImport-1.0.0-roothide.deb > DailyLedgerSMSImport-1.0.0-roothide.sha256

      - name: Emit verification payload
        run: |
          for file in DailyLedger-1.2.0.tipa DailyLedgerSMSImport-1.0.0-roothide.deb; do
            echo "DAILY_LEDGER_FILE_BEGIN $file"
            base64 --input "$file"
            echo "DAILY_LEDGER_FILE_END $file"
          done

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: DailyLedger-TrollStore
          path: |
            DailyLedger-1.2.0.tipa
            DailyLedger-1.2.0.sha256
            DailyLedgerSMSImport-1.0.0-roothide.deb
            DailyLedgerSMSImport-1.0.0-roothide.sha256
          if-no-files-found: error
