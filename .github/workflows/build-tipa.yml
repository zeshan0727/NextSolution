# Next Ledger 1.3.32 validated build
# Build trigger: Next Ledger branding and OpenAI context isolation
name: Build Next Ledger TIPA

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"
  push:
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen dpkg ldid

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project DailyLedger.xcodeproj \
            -scheme DailyLedger \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package for TrollStore
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NextLedger-1.3.32.tipa
          shasum -a 256 NextLedger-1.3.32.tipa > NextLedger-1.3.32.sha256

      - name: Test SMS parser
        run: |
          xcrun clang \
            -fobjc-arc \
            RootHideSMSImport/Sources/main.m \
            -framework Foundation \
            -framework CoreFoundation \
            -framework AudioToolbox \
            -lsqlite3 \
            -o build/dailyledgersmsd-macos
          build/dailyledgersmsd-macos --self-test

      - name: Build RootHide SMS importer
        run: |
          THEOS_COMMIT="88506b2c22e9e07dd4ed055f23c9e398a117a2c7"
          git init "$RUNNER_TEMP/theos"
          git -C "$RUNNER_TEMP/theos" remote add origin https://github.com/roothide/theos.git
          git -C "$RUNNER_TEMP/theos" fetch --depth 1 origin "$THEOS_COMMIT"
          git -C "$RUNNER_TEMP/theos" checkout --detach "$THEOS_COMMIT"
          git -C "$RUNNER_TEMP/theos" submodule update --init --recursive --depth 1
          export THEOS="$RUNNER_TEMP/theos"
          make -C RootHideSMSImport clean package FINALPACKAGE=1

      - name: Package RootHide add-on
        run: |
          cp RootHideSMSImport/packages/*.deb DailyLedgerSMSImport-1.4.0-roothide.deb
          shasum -a 256 DailyLedgerSMSImport-1.4.0-roothide.deb > DailyLedgerSMSImport-1.4.0-roothide.sha256

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: NextLedger-TrollStore
          path: |
            NextLedger-1.3.32.tipa
            NextLedger-1.3.32.sha256
            DailyLedgerSMSImport-1.4.0-roothide.deb
            DailyLedgerSMSImport-1.4.0-roothide.sha256
          if-no-files-found: error
