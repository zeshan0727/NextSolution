# Next Job 1.0.0 isolated branch build
name: Build Next Job TIPA

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    paths:
      - "NextJob/BUILD_TRIGGER"
      - ".github/workflows/build-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Expand Next Job source
        run: |
          base64 --decode NextJob/SourceArchive.b64 > /tmp/NextJobPayload.zip
          unzip -o /tmp/NextJobPayload.zip

      - name: Publish readable source to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NextJob/Sources NextJob/Resources NextJob/project.yml NextJob/README.md
          if ! git diff --cached --quiet; then
            git commit -m "Expand Next Job 1.0.0 source"
            git push
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate app icon
        run: |
          cat > /tmp/icon.swift <<'SWIFT'
          import AppKit
          let size = NSSize(width: 1024, height: 1024)
          let image = NSImage(size: size)
          image.lockFocus()
          let rect = NSRect(origin: .zero, size: size)
          NSGradient(colors: [NSColor(calibratedRed: 0.05, green: 0.38, blue: 0.95, alpha: 1), NSColor(calibratedRed: 0.24, green: 0.08, blue: 0.62, alpha: 1)])!.draw(in: NSBezierPath(roundedRect: rect, xRadius: 220, yRadius: 220), angle: -45)
          NSColor.white.withAlphaComponent(0.18).setFill()
          NSBezierPath(ovalIn: NSRect(x: 540, y: 500, width: 620, height: 620)).fill()
          NSColor.white.setStroke()
          let bag = NSBezierPath(roundedRect: NSRect(x: 210, y: 250, width: 604, height: 470), xRadius: 80, yRadius: 80)
          bag.lineWidth = 54
          bag.stroke()
          let handle = NSBezierPath()
          handle.move(to: NSPoint(x: 390, y: 720))
          handle.curve(to: NSPoint(x: 634, y: 720), controlPoint1: NSPoint(x: 390, y: 870), controlPoint2: NSPoint(x: 634, y: 870))
          handle.lineWidth = 54
          handle.stroke()
          let check = NSBezierPath()
          check.move(to: NSPoint(x: 350, y: 480))
          check.line(to: NSPoint(x: 475, y: 360))
          check.line(to: NSPoint(x: 690, y: 590))
          check.lineWidth = 58
          check.lineCapStyle = .round
          check.lineJoinStyle = .round
          check.stroke()
          image.unlockFocus()
          let rep = NSBitmapImageRep(data: image.tiffRepresentation!)!
          let png = rep.representation(using: .png, properties: [:])!
          try! png.write(to: URL(fileURLWithPath: "NextJob/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png"))
          SWIFT
          swift /tmp/icon.swift
          ICON_DIR="NextJob/Resources/Assets.xcassets/AppIcon.appiconset"
          for px in 40 58 60 80 87 120 180; do
            sips -z "$px" "$px" "$ICON_DIR/AppIcon-1024.png" --out "$ICON_DIR/AppIcon-$px.png" >/dev/null
          done

      - name: Generate Xcode project
        run: xcodegen generate --spec NextJob/project.yml

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project NextJob/NextJob.xcodeproj \
            -scheme NextJob \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package TIPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/NextJob.app"
          test -d "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload NextJob-1.0.0.tipa
          shasum -a 256 NextJob-1.0.0.tipa > NextJob-1.0.0.sha256
          ditto -c -k --sequesterRsrc --keepParent NextJob NextJob-1.0.0-source.zip

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: NextJob-TrollStore-1.0.0
          path: |
            NextJob-1.0.0.tipa
            NextJob-1.0.0.sha256
            NextJob-1.0.0-source.zip
          if-no-files-found: error
