name: Build Daily Ledger TIPA

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"
  push:
    paths:
      - "DailyLedger/**"
      - "RootHideSMSImport/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen dpkg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project DailyLedger.xcodeproj \
            -scheme DailyLedger \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package for TrollStore
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload DailyLedger-1.3.9.tipa
          shasum -a 256 DailyLedger-1.3.9.tipa > DailyLedger-1.3.9.sha256

      - name: Test SMS parser
        run: |
          xcrun clang \
            -fobjc-arc \
            RootHideSMSImport/Sources/main.m \
            -framework Foundation \
            -framework CoreFoundation \
            -framework AudioToolbox \
            -lsqlite3 \
            -o build/dailyledgersmsd-macos
          build/dailyledgersmsd-macos --self-test

      - name: Build RootHide SMS importer
        run: |
          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=16.0 \
            -fobjc-arc \
            -dynamiclib \
            -DDAILYLEDGER_TWEAK=1 \
            RootHideSMSImport/Sources/main.m \
            -framework Foundation \
            -framework CoreFoundation \
            -framework AudioToolbox \
            -lsqlite3 \
            -o build/DailyLedgerSMSImport.dylib
          codesign --force --sign - \
            --entitlements RootHideSMSImport/entitlements.plist \
            build/DailyLedgerSMSImport.dylib

          xcrun --sdk iphoneos clang \
            -arch arm64 \
            -miphoneos-version-min=16.0 \
            -fobjc-arc \
            -bundle \
            -undefined dynamic_lookup \
            RootHideSMSImport/Preferences/DLRootListController.m \
            -framework Foundation \
            -framework UIKit \
            -o build/DailyLedgerSMSImportPreferences
          codesign --force --sign - build/DailyLedgerSMSImportPreferences

      - name: Package RootHide add-on
        run: |
          rm -rf build/rootHidePackage
          mkdir -p build/rootHidePackage
          cp -R RootHideSMSImport/layout/. build/rootHidePackage/
          mkdir -p build/rootHidePackage/Library/MobileSubstrate/DynamicLibraries
          cp build/DailyLedgerSMSImport.dylib build/rootHidePackage/Library/MobileSubstrate/DynamicLibraries/
          mkdir -p build/rootHidePackage/Library/PreferenceBundles/DailyLedgerSMSImportPreferences.bundle
          cp build/DailyLedgerSMSImportPreferences build/rootHidePackage/Library/PreferenceBundles/DailyLedgerSMSImportPreferences.bundle/
          cp RootHideSMSImport/Preferences/Info.plist build/rootHidePackage/Library/PreferenceBundles/DailyLedgerSMSImportPreferences.bundle/
          cp RootHideSMSImport/Preferences/Root.plist build/rootHidePackage/Library/PreferenceBundles/DailyLedgerSMSImportPreferences.bundle/
          chmod 755 \
            build/rootHidePackage/Library/MobileSubstrate/DynamicLibraries/DailyLedgerSMSImport.dylib \
            build/rootHidePackage/Library/PreferenceBundles/DailyLedgerSMSImportPreferences.bundle/DailyLedgerSMSImportPreferences \
            build/rootHidePackage/DEBIAN/postinst \
            build/rootHidePackage/DEBIAN/prerm
          chmod 644 \
            build/rootHidePackage/DEBIAN/control \
            build/rootHidePackage/Library/MobileSubstrate/DynamicLibraries/DailyLedgerSMSImport.plist
          dpkg-deb --root-owner-group --build build/rootHidePackage DailyLedgerSMSImport-1.3.0-roothide.deb
          shasum -a 256 DailyLedgerSMSImport-1.3.0-roothide.deb > DailyLedgerSMSImport-1.3.0-roothide.sha256

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: DailyLedger-TrollStore
          path: |
            DailyLedger-1.3.9.tipa
            DailyLedger-1.3.9.sha256
            DailyLedgerSMSImport-1.3.0-roothide.deb
            DailyLedgerSMSImport-1.3.0-roothide.sha256
          if-no-files-found: error
