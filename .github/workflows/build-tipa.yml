name: Build Daily Ledger TIPA

on:
  workflow_dispatch:
  push:
    paths:
      - "DailyLedger/**"
      - "project.yml"
      - ".github/workflows/build-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project DailyLedger.xcodeproj \
            -scheme DailyLedger \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package for TrollStore
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload DailyLedger-1.0.0.tipa
          shasum -a 256 DailyLedger-1.0.0.tipa > DailyLedger-1.0.0.sha256

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: DailyLedger-TrollStore
          path: |
            DailyLedger-1.0.0.tipa
            DailyLedger-1.0.0.sha256
          if-no-files-found: error
