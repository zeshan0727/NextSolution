name: Build Next Reminder v1.2.1

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'NextReminderApp/**'
      - 'NextReminderScheduler/**'
      - '.github/workflows/build-next-reminder-v121-pr.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4

      - name: Build and verify app and scheduler
        run: |
          chmod +x NextReminderApp/ci/build-v121.sh
          NextReminderApp/ci/build-v121.sh

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NextReminder-v1.2.1
          path: |
            NextReminderApp/NextReminder-v1.2.1-unsigned.tipa
            NextReminderApp/NextReminder-v1.2.1-unsigned.ipa
            NextReminderApp/NextReminder-v1.2.1-unsigned.tipa.sha256
            NextReminderApp/NextReminderScheduler-v1.2.1.zip
            NextReminderApp/NextReminder/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png
            NextReminderApp/xcodebuild.log
          if-no-files-found: warn
          retention-days: 7
