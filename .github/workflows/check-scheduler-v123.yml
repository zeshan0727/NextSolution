name: Check Next Reminder Scheduler v1.2.3

on:
  push:
    branches: [next-reminder-scheduler-production]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run check
      - run: |
          grep -q "app.post('/v1/file-shares'" server.js
          grep -q "multipart/mixed" server.js
          grep -q "express.json({ limit: '30mb' })" server.js
