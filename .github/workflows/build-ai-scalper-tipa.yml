name: Build AI Scalper TIPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "AITradingDemo/**"
      - ".github/workflows/build-ai-scalper-tipa.yml"

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: AITradingDemo

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Restore app icon
        run: |
          base64 --decode AIScalperDemo/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png.b64 \
            > AIScalperDemo/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned iPhone app
        run: |
          xcodebuild \
            -project AIScalperDemo.xcodeproj \
            -scheme AIScalperDemo \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA and TIPA
        run: |
          mkdir -p package/Payload
          cp -R "build/Build/Products/Release-iphoneos/AI Scalper Demo.app" package/Payload/
          cd package
          zip -qry ../AI-Scalper-Demo.ipa Payload
          cd ..
          cp AI-Scalper-Demo.ipa AI-Scalper-Demo.tipa

      - name: Upload install files
        uses: actions/upload-artifact@v4
        with:
          name: AI-Scalper-Demo-TrollStore
          path: |
            AITradingDemo/AI-Scalper-Demo.ipa
            AITradingDemo/AI-Scalper-Demo.tipa

