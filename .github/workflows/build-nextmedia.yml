name: Build Next Media 1.3.1

on:
  workflow_dispatch:
  push:
    branches: [next-media-v1]
    paths:
      - "NextMediaApp/**"
      - "NextMediaPatch/**"
      - ".github/workflows/build-nextmedia.yml"
  pull_request:
    branches: [main]
    paths:
      - "NextMediaApp/**"
      - "NextMediaPatch/**"
      - ".github/workflows/build-nextmedia.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Restore source project
        run: |
          set -euo pipefail
          cat NextMediaApp/source.part00 NextMediaApp/source.part01 NextMediaApp/source.part02 > /tmp/NextMedia-source.b64
          python3 - <<'PY'
          import base64
          from pathlib import Path
          encoded = Path('/tmp/NextMedia-source.b64').read_text().strip()
          Path('/tmp/NextMedia-project.tar.gz').write_bytes(base64.b64decode(encoded, validate=True))
          PY
          tar -xzf /tmp/NextMedia-project.tar.gz
          python3 projects/NextMedia/ci/generate_icons.py

      - name: Apply browser and version 1.2 patches
        run: |
          set -euo pipefail
          cp NextMediaPatch/project.yml projects/NextMedia/project.yml
          cp -R NextMediaPatch/NextMedia/. projects/NextMedia/NextMedia/
          cat NextMediaApp/v12patch.part00 NextMediaApp/v12patch.part01 > /tmp/NextMedia-v12-patch.b64
          python3 - <<'PY'
          import base64
          from pathlib import Path
          encoded = Path('/tmp/NextMedia-v12-patch.b64').read_text().strip()
          Path('/tmp/NextMedia-v12-patch.tar.gz').write_bytes(base64.b64decode(encoded, validate=True))
          PY
          tar -xzf /tmp/NextMedia-v12-patch.tar.gz

      - name: Prepare version 1.2 source and themed icons
        run: |
          set -euo pipefail
          python3 -m venv /tmp/nextmedia-tools
          /tmp/nextmedia-tools/bin/pip install --disable-pip-version-check pillow
          /tmp/nextmedia-tools/bin/python NextMediaApp/prepare_v12.py

      - name: Apply verified version 1.3 patch
        run: |
          set -euo pipefail
          cat NextMediaApp/v13patch.part00a NextMediaApp/v13patch.part00b NextMediaApp/v13patch.part01 NextMediaApp/v13patch.part02 NextMediaApp/v13patch.part03 > /tmp/NextMedia-v13-patch.b64
          python3 - <<'PY'
          import base64
          from pathlib import Path
          encoded = Path('/tmp/NextMedia-v13-patch.b64').read_text().strip()
          archive = base64.b64decode(encoded, validate=True)
          expected = '5b43fc6819ea143cdba584d43ff57ae682edaf24b11a43e48474487339b2ba4b'
          import hashlib
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected:
              raise SystemExit(f'v1.3 patch checksum mismatch: {actual}')
          Path('/tmp/NextMedia-v13-patch.tar.gz').write_bytes(archive)
          PY
          tar -xzf /tmp/NextMedia-v13-patch.tar.gz

      - name: Verify version 1.3 source changes
        run: |
          set -euo pipefail
          grep -q 'Show downloadable media' projects/NextMedia/NextMedia/Views/BrowserView.swift
          grep -q 'Download & Merge' projects/NextMedia/NextMedia/Views/DetectedMediaListView.swift
          grep -q 'fileSizeText' projects/NextMedia/NextMedia/Models/MediaItem.swift
          grep -q 'Prefer 1080p on YouTube' projects/NextMedia/NextMedia/Views/SettingsView.swift
          grep -q 'AdaptiveMediaDownloader' projects/NextMedia/NextMedia/Services/AdaptiveMediaDownloader.swift
          if grep -R -q 'promptedMedia' projects/NextMedia/NextMedia; then
            echo 'Old automatic media prompt code is still present'
            exit 1
          fi
          python3 - <<'PY'
          import plistlib
          from pathlib import Path
          with Path('projects/NextMedia/NextMedia/Info.plist').open('rb') as handle:
              info = plistlib.load(handle)
          assert info['CFBundleShortVersionString'] == '1.3.0', info
          assert info['CFBundleVersion'] == '4', info
          PY

      - name: Apply selected glass app icon and finalize 1.3.1
        run: |
          set +e
          /tmp/nextmedia-tools/bin/python - <<'PY' > projects/NextMedia/icon-step.log 2>&1
          import base64
          import hashlib
          import json
          import plistlib
          from pathlib import Path
          from PIL import Image

          encoded = Path('NextMediaApp/icon131.b64').read_text().strip()
          raw = base64.b64decode(encoded, validate=True)
          expected = '63fb14a501b661d8a0f49521444771f31c29bfbcf38b679967064fb28e0d6aaa'
          actual = hashlib.sha256(raw).hexdigest()
          if actual != expected:
              raise SystemExit(f'icon checksum mismatch: {actual}')

          source_path = Path('/tmp/NextMedia-glass-icon.jpg')
          source_path.write_bytes(raw)
          source = Image.open(source_path).convert('RGB')
          if source.size[0] != source.size[1]:
              side = min(source.size)
              left = (source.width - side) // 2
              top = (source.height - side) // 2
              source = source.crop((left, top, left + side, top + side))

          assets = Path('projects/NextMedia/NextMedia/Resources/Assets.xcassets')
          generated = []
          for set_name in ('AppIcon.appiconset', 'AppIconDark.appiconset'):
              icon_set = assets / set_name
              manifest_path = icon_set / 'Contents.json'
              if not manifest_path.exists():
                  if set_name == 'AppIcon.appiconset':
                      raise SystemExit(f'Missing required icon set: {manifest_path}')
                  continue
              manifest = json.loads(manifest_path.read_text())
              for entry in manifest.get('images', []):
                  filename = entry.get('filename')
                  size_text = entry.get('size')
                  scale_text = entry.get('scale')
                  if not filename or not size_text or not scale_text:
                      continue
                  points = float(size_text.split('x')[0])
                  scale = float(scale_text.rstrip('x'))
                  pixels = int(round(points * scale))
                  icon = source.resize((pixels, pixels), Image.Resampling.LANCZOS)
                  destination = icon_set / filename
                  icon.save(destination, 'PNG', optimize=True)
                  generated.append(destination)
          if not generated:
              raise SystemExit('No app icon files were generated')

          plist_path = Path('projects/NextMedia/NextMedia/Info.plist')
          with plist_path.open('rb') as handle:
              info = plistlib.load(handle)
          info['CFBundleShortVersionString'] = '1.3.1'
          info['CFBundleVersion'] = '5'
          info['CFBundleIconName'] = 'AppIcon'
          with plist_path.open('wb') as handle:
              plistlib.dump(info, handle, sort_keys=False)

          settings = Path('projects/NextMedia/NextMedia/Views/SettingsView.swift')
          text = settings.read_text()
          text = text.replace('Text("1.3.0")', 'Text("1.3.1")')
          cleaned = []
          for line in text.splitlines():
              if any(token in line for token in ('Next Solution', 'Zeeshan', 'Zeshan', '0727')):
                  indent = line[:len(line) - len(line.lstrip())]
                  cleaned.append(indent + 'Text("Next Media")')
              else:
                  cleaned.append(line)
          settings.write_text('\n'.join(cleaned) + '\n')

          print(f'icon_sha256={actual}')
          print(f'source_size={source.width}x{source.height}')
          print(f'generated_count={len(generated)}')
          print(f'version={info["CFBundleShortVersionString"]}')
          print(f'build={info["CFBundleVersion"]}')
          PY
          status=$?
          cat projects/NextMedia/icon-step.log || true
          exit $status

      - name: Configure LAME MP3 package
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          encoder = Path('projects/NextMedia/NextMedia/Audio/MP3Encoder.m')
          source = encoder.read_text().replace('#import "lame.h"', '#import <LAME/lame.h>')
          encoder.write_text(source)
          project = '''name: NextMedia
          options:
            bundleIdPrefix: uk.zeshanbarvi
            deploymentTarget:
              iOS: "15.0"
            createIntermediateGroups: true
          packages:
            LAME:
              url: https://github.com/BB9z/LAME-xcframework
              exactVersion: "3.100.3"
          settings:
            base:
              SWIFT_VERSION: "5.0"
              IPHONEOS_DEPLOYMENT_TARGET: "15.0"
              MARKETING_VERSION: "1.3.1"
              CURRENT_PROJECT_VERSION: "5"
              TARGETED_DEVICE_FAMILY: "1,2"
              SUPPORTS_MACCATALYST: NO
              ENABLE_BITCODE: NO
              CODE_SIGNING_ALLOWED: NO
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGN_IDENTITY: ""
          targets:
            NextMedia:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: NextMedia
                  excludes:
                    - Resources
                    - Info.plist
                - path: NextMedia/Resources
                  buildPhase: resources
              dependencies:
                - package: LAME
                  product: LAME
                - sdk: AudioToolbox.framework
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: uk.zeshanbarvi.nextmedia
                  PRODUCT_NAME: NextMedia
                  INFOPLIST_FILE: NextMedia/Info.plist
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                  ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
                  ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
                  GENERATE_INFOPLIST_FILE: NO
                  SWIFT_OBJC_BRIDGING_HEADER: NextMedia/NextMedia-Bridging-Header.h
              scheme:
                testTargets: []
          '''
          import textwrap
          Path('projects/NextMedia/project.yml').write_text(textwrap.dedent(project))
          PY

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: projects/NextMedia
        run: |
          set -o pipefail
          xcodegen generate 2>&1 | tee xcodegen.log

      - name: Resolve Swift packages
        working-directory: projects/NextMedia
        run: xcodebuild -resolvePackageDependencies -project NextMedia.xcodeproj -scheme NextMedia

      - name: Build unsigned app
        working-directory: projects/NextMedia
        run: |
          set -o pipefail
          xcodebuild \
            -project NextMedia.xcodeproj \
            -scheme NextMedia \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY='' \
            clean build | tee xcodebuild.log

      - name: Verify compiled icon and final version
        working-directory: projects/NextMedia
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/NextMedia.app"
          test -f "$APP_PATH/Assets.car"
          test -f "$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist" | grep -qx '1.3.1'
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Info.plist" | grep -qx '5'
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIconName' "$APP_PATH/Info.plist" | grep -qx 'AppIcon'
          test "$(stat -f%z "$APP_PATH/Assets.car")" -gt 50000
          grep -q 'CompileAssetCatalog' xcodebuild.log
          grep -q 'AppIcon' xcodebuild.log

      - name: Package IPA, TIPA and source
        working-directory: projects/NextMedia
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/NextMedia.app"
          test -d "$APP_PATH"
          rm -rf Payload dist
          mkdir -p Payload dist
          cp -R "$APP_PATH" Payload/NextMedia.app
          /usr/bin/zip -qry "dist/NextMedia-1.3.1.ipa" Payload
          cp "dist/NextMedia-1.3.1.ipa" "dist/NextMedia-1.3.1.tipa"
          cd ../..
          /usr/bin/zip -qry "projects/NextMedia/dist/NextMedia-1.3.1-source.zip" projects/NextMedia \
            -x 'projects/NextMedia/build/*' 'projects/NextMedia/Payload/*' 'projects/NextMedia/dist/*' 'projects/NextMedia/.build/*'
          cd projects/NextMedia
          shasum -a 256 dist/NextMedia-1.3.1.ipa dist/NextMedia-1.3.1.tipa dist/NextMedia-1.3.1-source.zip > dist/SHA256SUMS.txt

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NextMedia-1.3.1
          if-no-files-found: warn
          path: |
            projects/NextMedia/dist/NextMedia-1.3.1.ipa
            projects/NextMedia/dist/NextMedia-1.3.1.tipa
            projects/NextMedia/dist/NextMedia-1.3.1-source.zip
            projects/NextMedia/dist/SHA256SUMS.txt
            projects/NextMedia/xcodebuild.log
            projects/NextMedia/xcodegen.log
            projects/NextMedia/icon-step.log
