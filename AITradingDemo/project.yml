name: AIScalperDemo
options:
  bundleIdPrefix: uk.zeshanbarvi
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
targets:
  AIScalperDemo:
    type: application
    platform: iOS
    sources:
      - path: AIScalperDemo
        excludes:
          - Info.plist
    info:
      path: AIScalperDemo/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: uk.zeshanbarvi.aiscalperdemo
        PRODUCT_NAME: AI Scalper Demo
        MARKETING_VERSION: 0.2.0
        CURRENT_PROJECT_VERSION: 2
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    scheme:
      testTargets: []
